<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Genorah Dashboard</title>
<style>
  :root {
    /* Theme — overwritten per-project from DNA tokens at runtime. */
    --bg: #0a0a0b; --surface: #141418; --raised: #1c1c22; --text: #e8e8ea;
    --muted: #8a8a95; --border: #2a2a31; --primary: #7c5cff; --accent: #7c5cff;
    --glow: #7c5cff; --ok: #3fc28a; --warn: #f0a830; --fail: #ef4458;

    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --r-sm: 8px; --r: 14px; --r-lg: 20px;
    --gap: 20px;
    --t-xs: 11px; --t-sm: 12px; --t-base: 14px; --t-md: 16px; --t-lg: 20px; --t-xl: 30px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background:
      radial-gradient(1100px 520px at 78% -8%, color-mix(in srgb, var(--glow) 16%, transparent), transparent 60%),
      radial-gradient(900px 480px at 8% 0%, color-mix(in srgb, var(--primary) 9%, transparent), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font: var(--t-base)/1.55 var(--font-sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .container { max-width: 1340px; margin: 0 auto; padding: 22px clamp(16px, 3vw, 34px) 64px; }

  /* ── Header ── */
  header.top {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 16px 20px; margin-bottom: var(--gap);
    background: color-mix(in srgb, var(--surface) 86%, transparent);
    backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid var(--border); border-radius: var(--r-lg);
    box-shadow: 0 1px 0 color-mix(in srgb, #fff 6%, transparent) inset,
                0 18px 50px -28px color-mix(in srgb, var(--glow) 70%, transparent);
  }
  .ident { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .status-dot {
    flex: none; width: 11px; height: 11px; border-radius: 50%;
    background: var(--ok); box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 60%, transparent);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 55%, transparent); }
    70% { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .ident .meta { min-width: 0; }
  .ident h1 {
    font-size: var(--t-xl); font-weight: 680; letter-spacing: -0.02em; line-height: 1.05;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ident .sub { font-size: var(--t-sm); color: var(--muted); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52ch; }
  .head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex: none; }
  .ts { font-size: var(--t-xs); color: var(--muted); font-family: var(--font-mono); }
  .dna-chips { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 320px; }
  .dna-chip {
    width: 26px; height: 26px; border-radius: 7px; border: 1px solid color-mix(in srgb, #fff 14%, transparent);
    position: relative; cursor: default; transition: transform .18s ease;
  }
  .dna-chip:hover { transform: translateY(-2px) scale(1.06); }
  .dna-chip:hover::after {
    content: attr(data-token); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
    background: var(--raised); color: var(--text); padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    font-size: var(--t-xs); font-family: var(--font-mono); border: 1px solid var(--border); z-index: 5;
    box-shadow: 0 8px 24px -10px #000;
  }

  /* ── Stat band ── */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: var(--gap); }
  .stat {
    background: linear-gradient(180deg, color-mix(in srgb, var(--raised) 70%, transparent), var(--surface));
    border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden;
  }
  .stat::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 3px; background: var(--accent); opacity: .55; }
  .stat .v { font-size: 26px; font-weight: 680; line-height: 1; }
  .stat .l { font-size: var(--t-xs); text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .stat.pass .v { color: var(--ok); } .stat.fail .v { color: var(--fail); }

  /* ── Bento ── */
  .bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--gap); }
  .span-12 { grid-column: span 12; } .span-7 { grid-column: span 7; }
  .span-6 { grid-column: span 6; } .span-5 { grid-column: span 5; }
  .panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 20px; box-shadow: 0 1px 0 color-mix(in srgb, #fff 5%, transparent) inset;
    animation: rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  .bento .panel:nth-child(1){animation-delay:.04s} .bento .panel:nth-child(2){animation-delay:.09s}
  .bento .panel:nth-child(3){animation-delay:.14s} .bento .panel:nth-child(4){animation-delay:.19s}
  .bento .panel:nth-child(5){animation-delay:.24s} .bento .panel:nth-child(6){animation-delay:.29s}
  .bento .panel:nth-child(7){animation-delay:.34s} .bento .panel:nth-child(8){animation-delay:.39s}
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .panel > h2 {
    font-size: var(--t-xs); text-transform: uppercase; letter-spacing: .12em; color: var(--muted);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .panel > h2::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

  /* ── Waves ── */
  .waves { display: flex; gap: 10px; flex-wrap: wrap; }
  .wave-pill {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 999px; font-size: var(--t-sm); font-weight: 560;
  }
  .wave-pill .wdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .wave-pill .cnt { color: var(--muted); font-family: var(--font-mono); font-size: var(--t-xs); }
  .wave-pill.done { border-color: color-mix(in srgb, var(--ok) 55%, var(--border)); color: var(--ok); }
  .wave-pill.done .wdot { background: var(--ok); }
  .wave-pill.failed { border-color: color-mix(in srgb, var(--fail) 55%, var(--border)); color: var(--fail); }
  .wave-pill.failed .wdot { background: var(--fail); }
  .wave-pill.building { border-color: color-mix(in srgb, var(--primary) 55%, var(--border)); color: var(--primary); }
  .wave-pill.building .wdot { background: var(--primary); animation: pulse 2s infinite; }
  .wave-pill.qa { border-color: color-mix(in srgb, var(--warn) 55%, var(--border)); color: var(--warn); }
  .wave-pill.qa .wdot { background: var(--warn); }

  /* ── Sections ── */
  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(212px, 1fr)); gap: 14px; }
  .section-card {
    background: var(--raised); border: 1px solid var(--border); border-radius: var(--r);
    padding: 15px; transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .section-card:hover {
    transform: translateY(-3px); border-color: color-mix(in srgb, var(--glow) 45%, var(--border));
    box-shadow: 0 16px 36px -22px color-mix(in srgb, var(--glow) 80%, transparent);
  }
  .section-card .beat { font-size: var(--t-xs); text-transform: uppercase; letter-spacing: .14em; color: var(--muted); }
  .section-card .name { font-weight: 640; font-size: var(--t-md); margin: 4px 0 10px; letter-spacing: -0.01em; }
  .section-card .scorerow { display: flex; align-items: baseline; gap: 8px; }
  .section-card .score { font-size: 30px; font-weight: 720; line-height: 1; }
  .section-card .tier { font-size: var(--t-xs); font-weight: 600; }
  .t-sotm .score, .t-honoree .score, .t-sotd .score, .t-sotm .tier, .t-honoree .tier, .t-sotd .tier { color: var(--ok); }
  .t-sotm .score, .t-honoree .score { text-shadow: 0 0 22px color-mix(in srgb, var(--ok) 55%, transparent); }
  .t-strong .score, .t-strong .tier { color: var(--primary); }
  .t-baseline .score, .t-baseline .tier { color: var(--warn); }
  .t-reject .score, .t-reject .tier { color: var(--fail); }
  .t-none .score, .t-none .tier { color: var(--muted); }

  .verdict { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap;
    padding-top: 12px; border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent); }
  .badge { font-size: var(--t-xs); font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: .05em; }
  .badge.pass { background: color-mix(in srgb, var(--ok) 18%, transparent); color: var(--ok); }
  .badge.fail { background: color-mix(in srgb, var(--fail) 18%, transparent); color: var(--fail); }
  .badge.none { background: var(--bg); color: var(--muted); }
  .chk { font-size: var(--t-xs); color: var(--fail); border: 1px solid color-mix(in srgb, var(--fail) 55%, transparent);
    border-radius: 5px; padding: 1px 6px; font-family: var(--font-mono); }
  .ceil { font-size: var(--t-xs); color: var(--muted); margin-left: auto; font-family: var(--font-mono); }

  /* ── Hotspots ── */
  .hot-row { display: grid; grid-template-columns: 120px 1fr auto; align-items: center; gap: 10px; margin: 9px 0; font-size: var(--t-sm); }
  .hot-name { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--text); }
  .hot-track { background: color-mix(in srgb, var(--bg) 80%, transparent); border-radius: 4px; height: 11px; overflow: hidden; }
  .hot-bar { height: 100%; width: 0; border-radius: 4px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--fail) 60%, var(--warn)), var(--fail));
    transition: width .65s cubic-bezier(.2,.7,.2,1); }
  .hot-count { font-family: var(--font-mono); color: var(--muted); font-size: var(--t-xs); }

  /* ── Screenshots ── */
  .shots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .shot { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; background: var(--bg);
    transition: transform .2s ease, border-color .2s ease; }
  .shot:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--glow) 40%, var(--border)); }
  .shot img { width: 100%; display: block; aspect-ratio: 16/10; object-fit: cover; object-position: top; }
  .shot .lbl { font-size: var(--t-xs); color: var(--muted); padding: 7px 9px; text-transform: uppercase;
    letter-spacing: .08em; font-family: var(--font-mono); }

  /* ── Misc ── */
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 13px;
    white-space: pre-wrap; font: var(--t-sm)/1.5 var(--font-mono); max-height: 300px; overflow: auto; color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 20px; text-align: center; font-size: var(--t-sm); }
  #boot-error { background: color-mix(in srgb, var(--fail) 18%, var(--surface)); border: 1px solid var(--fail);
    color: var(--text); padding: 14px 18px; border-radius: var(--r); margin-bottom: var(--gap); font-size: var(--t-sm); }
  #graph-frame { width: 100%; height: 420px; border: none; border-radius: var(--r-sm); background: var(--bg); margin-top: 12px; }
  #graph-summary { font-size: var(--t-sm); color: var(--muted); }
  #graph-summary code { background: var(--bg); padding: 2px 7px; border-radius: 4px; font-family: var(--font-mono); }
  .graph-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .panel-link { flex: none; color: var(--muted); text-decoration: none; font-size: var(--t-xs); font-weight: 600;
    border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 10px; white-space: nowrap; transition: color .15s, border-color .15s; }
  .panel-link:hover { color: var(--primary); border-color: var(--primary); }
  .panel-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 1100px) {
    .bento { grid-template-columns: repeat(6, 1fr); }
    .span-7, .span-12 { grid-column: span 6; } .span-5, .span-6 { grid-column: span 6; }
    .stats { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 680px) {
    .bento { grid-template-columns: 1fr; } [class*="span-"] { grid-column: 1 / -1; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    header.top { flex-direction: column; align-items: flex-start; }
    .head-right { align-items: flex-start; }
  }
  /* ── Phase 3: filter bar ── */
  .filterbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .facets { display: inline-flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .facet { border: none; background: transparent; color: var(--muted); font: 600 var(--t-xs) var(--font-sans);
    padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: color .15s, background .15s; }
  .facet:hover { color: var(--text); }
  .facet.active { background: var(--primary); color: #fff; }
  .facet:focus-visible, .filter-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .filter-input { flex: 1; min-width: 140px; max-width: 280px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text); font: var(--t-sm) var(--font-sans); padding: 7px 11px; }
  .filter-input:focus-visible { border-color: var(--accent); }
  .section-card { cursor: pointer; }
  .section-card:focus-visible, .shot:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Phase 3: drawer ── */
  .scrim { position: fixed; inset: 0; background: color-mix(in srgb, #000 55%, transparent); z-index: 40; animation: fadein .2s ease; }
  .scrim[hidden], .drawer[hidden], .lightbox[hidden] { display: none; }
  @keyframes fadein { from { opacity: 0; } }
  .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(560px, 94vw); z-index: 50;
    background: var(--surface); border-left: 1px solid var(--border); box-shadow: -30px 0 80px -40px #000;
    display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.2,.7,.2,1); }
  .drawer.open { transform: translateX(0); }
  .drawer-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 20px; border-bottom: 1px solid var(--border); }
  .drawer-beat { font-size: var(--t-xs); text-transform: uppercase; letter-spacing: .14em; color: var(--muted); }
  .drawer-title { font-size: var(--t-lg); font-weight: 680; letter-spacing: -0.01em; margin-top: 3px; word-break: break-word; }
  .drawer-close, .lb-close { background: var(--bg); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: var(--r-sm); cursor: pointer; font-size: 15px; flex: none; }
  .drawer-close:hover, .lb-close:hover { border-color: var(--fail); color: var(--fail); }
  .drawer-close:focus-visible, .lb-close:focus-visible, .lb-nav:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .drawer-body { padding: 20px; overflow: auto; display: grid; gap: 18px; }
  .drawer-label { font-size: var(--t-xs); text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 8px; }
  .fail-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: baseline; padding: 8px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent); }
  .fail-detail { font-size: var(--t-sm); color: var(--text); font-family: var(--font-mono); word-break: break-word; }

  /* ── Phase 3: lightbox ── */
  .lightbox { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: color-mix(in srgb, #000 82%, transparent); animation: fadein .2s ease; padding: 24px; }
  .lb-fig { display: flex; flex-direction: column; align-items: center; gap: 12px; max-width: 90vw; }
  .lb-fig img { max-width: 86vw; max-height: 80vh; border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--bg); }
  .lb-fig figcaption { font-family: var(--font-mono); font-size: var(--t-sm); color: var(--text); text-transform: uppercase; letter-spacing: .08em; }
  .lb-close { position: absolute; top: 20px; right: 20px; }
  .lb-nav { background: color-mix(in srgb, var(--surface) 80%, transparent); border: 1px solid var(--border); color: var(--text);
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 22px; flex: none; }
  .lb-nav:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .lb-nav:disabled { opacity: .3; cursor: default; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="container">
  <div id="boot-error" hidden></div>

  <header class="top">
    <div class="ident">
      <span class="status-dot" title="live"></span>
      <div class="meta">
        <h1 id="proj-name">Genorah Dashboard</h1>
        <div class="sub" id="proj-sub">—</div>
      </div>
    </div>
    <div class="head-right">
      <div class="ts" id="ts">connecting…</div>
      <div class="dna-chips" id="dna-chips"></div>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="bento">
    <section class="panel span-12"><h2>Waves</h2><div class="waves" id="waves"></div></section>

    <section class="panel span-12"><h2>Sections</h2>
      <div class="filterbar">
        <div class="facets" role="group" aria-label="Filter sections by verdict">
          <button class="facet active" data-verdict="all" aria-pressed="true">All</button>
          <button class="facet" data-verdict="pass" aria-pressed="false">Pass</button>
          <button class="facet" data-verdict="fail" aria-pressed="false">Fail</button>
          <button class="facet" data-verdict="none" aria-pressed="false">Unverified</button>
        </div>
        <input class="filter-input" id="filter-q" type="text" placeholder="filter by name…" aria-label="Filter sections by name">
      </div>
      <div class="sections-grid" id="sections"></div>
    </section>

    <section class="panel span-5"><h2>Gate Hotspots</h2><div id="hotspots"></div></section>

    <section class="panel span-7"><h2>Visual QA — latest capture</h2><div class="shots-grid" id="shots"></div></section>

    <section class="panel span-6"><h2>Context</h2><pre id="context">loading…</pre></section>

    <section class="panel span-6"><h2>Decisions (tail)</h2><pre id="decisions">loading…</pre></section>

    <section class="panel span-12" id="graph-panel"><h2>Knowledge Graph</h2>
      <div class="graph-head">
        <div id="graph-summary"></div>
        <a class="panel-link" href="/graph" target="_blank" rel="noopener">⤢ Full page</a>
      </div>
      <iframe id="graph-frame" title="Knowledge graph"></iframe>
    </section>
  </div>
</div>

<div class="scrim" id="scrim" hidden></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title" hidden>
  <div class="drawer-head">
    <div>
      <div class="drawer-beat" id="drawer-beat"></div>
      <h2 class="drawer-title" id="drawer-title">Section</h2>
    </div>
    <button class="drawer-close" id="drawer-close" aria-label="Close section detail">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Screenshot viewer" hidden>
  <button class="lb-close" id="lb-close" aria-label="Close screenshot viewer">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous breakpoint">‹</button>
  <figure class="lb-fig"><img id="lb-img" alt=""><figcaption id="lb-cap"></figcaption></figure>
  <button class="lb-nav lb-next" id="lb-next" aria-label="Next breakpoint">›</button>
</div>

<script type="module">
let buildViewModel, filterSections, buildSectionDetail;
try {
  ({ buildViewModel, filterSections, buildSectionDetail } = await import('/scripts/dashboard/view-model.mjs'));
} catch (e) {
  const b = document.getElementById('boot-error');
  b.hidden = false;
  b.textContent = 'renderer failed to load: ' + (e && e.message ? e.message : e);
  throw e;
}

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const $ = id => document.getElementById(id);
const prev = { stats: {}, scores: {} };
let firstPaint = true;

// Phase 3 interaction state
let lastVm = null;
let currentShots = [];
const filterState = { q: '', verdict: 'all' };
let drawerOpen = false, drawerReturn = null, drawerReq = 0;
let lbOpen = false, lbReturn = null, lbIndex = 0;

// Animate a numeric element from → to. Instant when reduced-motion or no change.
function countUp(el, from, to) {
  const target = Number(to);
  if (REDUCED || !Number.isFinite(target) || from === target) { el.textContent = String(to); return; }
  const start = Number.isFinite(from) ? from : 0;
  const t0 = performance.now(), dur = 600;
  function step(now) {
    const k = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - k, 3);
    el.textContent = String(Math.round(start + (target - start) * eased));
    if (k < 1) requestAnimationFrame(step);
    else el.textContent = String(to);
  }
  requestAnimationFrame(step);
}

function applyTheme(theme) {
  const root = document.documentElement;
  for (const [k, v] of Object.entries(theme || {})) root.style.setProperty('--' + k, v);
}

function renderStats(stats) {
  const tiles = [
    { key: 'total', label: 'Sections', cls: '' },
    { key: 'verified', label: 'Verified', cls: '' },
    { key: 'floorPass', label: 'Floor Pass', cls: 'pass' },
    { key: 'floorFail', label: 'Floor Fail', cls: 'fail' },
    { key: 'avgScore', label: 'Avg Score', cls: '' },
  ];
  const host = $('stats');
  host.replaceChildren();
  for (const t of tiles) {
    const val = stats[t.key];
    const tile = document.createElement('div');
    tile.className = ('stat ' + t.cls).trim();
    const v = document.createElement('div');
    v.className = 'v num';
    const l = document.createElement('div');
    l.className = 'l';
    l.textContent = t.label;
    if (val == null) { v.textContent = '—'; }
    else { countUp(v, firstPaint ? 0 : (prev.stats[t.key] ?? val), val); prev.stats[t.key] = val; }
    tile.append(v, l);
    host.appendChild(tile);
  }
}

function renderWaves(waves) {
  const host = $('waves');
  host.replaceChildren();
  if (!waves.length) { host.appendChild(emptyEl('no waves defined')); return; }
  for (const w of waves) {
    const pill = document.createElement('div');
    pill.className = ('wave-pill ' + (w.status || '')).trim();
    const dot = document.createElement('span'); dot.className = 'wdot';
    const lbl = document.createElement('span'); lbl.textContent = w.label;
    pill.append(dot, lbl);
    if (w.count) { const c = document.createElement('span'); c.className = 'cnt'; c.textContent = '·' + w.count; pill.appendChild(c); }
    host.appendChild(pill);
  }
}

function renderSections(sections, emptyMsg = 'no sections yet — run /gen:plan') {
  const host = $('sections');
  host.replaceChildren();
  if (!sections.length) { host.appendChild(emptyEl(emptyMsg)); return; }
  for (const s of sections) {
    const card = document.createElement('div');
    card.className = 'section-card t-' + s.tierKlass;
    card.setAttribute('role', 'button');
    card.tabIndex = 0;
    card.setAttribute('aria-label', `Open ${s.name} detail`);
    card.addEventListener('click', () => openSection(s.name));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSection(s.name); } });
    card.appendChild(divText('beat', s.beat));
    card.appendChild(divText('name', s.name));

    const row = document.createElement('div'); row.className = 'scorerow';
    const score = document.createElement('div'); score.className = 'score num';
    if (s.score == null) { score.textContent = '—'; }
    else { countUp(score, firstPaint ? 0 : (prev.scores[s.name] ?? s.score), s.score); prev.scores[s.name] = s.score; }
    const tier = document.createElement('div'); tier.className = 'tier'; tier.textContent = s.tierLabel;
    row.append(score, tier);
    card.appendChild(row);

    const vr = document.createElement('div'); vr.className = 'verdict';
    const badge = document.createElement('span');
    badge.className = 'badge ' + s.verdict.state;
    badge.textContent = s.verdict.label;
    vr.appendChild(badge);
    for (const chk of s.verdict.failures) {
      const c = document.createElement('span'); c.className = 'chk'; c.textContent = chk; vr.appendChild(c);
    }
    if (s.verdict.ceiling != null) {
      const ceil = document.createElement('span'); ceil.className = 'ceil'; ceil.textContent = 'ceiling ' + s.verdict.ceiling; vr.appendChild(ceil);
    }
    card.appendChild(vr);
    host.appendChild(card);
  }
}

function renderHotspots(hotspots) {
  const host = $('hotspots');
  host.replaceChildren();
  if (!hotspots.length) { host.appendChild(emptyEl('no failures — floor clean')); return; }
  for (const h of hotspots) {
    const row = document.createElement('div'); row.className = 'hot-row';
    const name = document.createElement('span'); name.className = 'hot-name'; name.textContent = h.check;
    const track = document.createElement('div'); track.className = 'hot-track';
    const bar = document.createElement('div'); bar.className = 'hot-bar';
    track.appendChild(bar);
    requestAnimationFrame(() => { bar.style.width = h.px + 'px'; }); // animate from 0 → px
    const cnt = document.createElement('span'); cnt.className = 'hot-count'; cnt.textContent = h.count;
    row.append(name, track, cnt);
    host.appendChild(row);
  }
}

function renderShots(screenshots) {
  const host = $('shots');
  host.replaceChildren();
  if (!screenshots.length) { host.appendChild(emptyEl('no captures yet — run /gen:audit')); return; }
  screenshots.forEach((sh, i) => {
    const cell = document.createElement('div'); cell.className = 'shot';
    cell.setAttribute('role', 'button'); cell.tabIndex = 0;
    cell.setAttribute('aria-label', `Open ${(sh.label || '')} screenshot full size`);
    cell.addEventListener('click', () => openLightbox(i));
    cell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); } });
    const img = document.createElement('img');
    img.loading = 'lazy'; img.alt = (sh.label || '') + ' screenshot';
    img.src = '/api/screenshot/' + encodeURIComponent(sh.file);
    const lbl = document.createElement('div'); lbl.className = 'lbl';
    lbl.textContent = (sh.label || '') + ' · ' + sh.width + 'px';
    cell.append(img, lbl);
    host.appendChild(cell);
  });
}

function renderGraph(graph) {
  const summary = $('graph-summary'), frame = $('graph-frame');
  if (graph && graph.exists) {
    summary.textContent = `${graph.nodes} nodes · ${graph.edges} edges · updated ${Math.round((graph.ageMs || 0) / 1000)}s ago`;
    if (!frame.getAttribute('src')) frame.src = '/api/graph'; // lazy: only fetch when a graph exists
    frame.style.display = '';
  } else {
    summary.innerHTML = 'No graph yet — run <code>gen:graphify scan</code>';
    frame.removeAttribute('src');
    frame.style.display = 'none';
  }
}

function emptyEl(text) { const e = document.createElement('div'); e.className = 'empty'; e.textContent = text; return e; }
function divText(cls, text) { const d = document.createElement('div'); d.className = cls; d.textContent = text; return d; }

function render(vm) {
  applyTheme(vm.theme);
  $('proj-name').textContent = vm.project.name;
  $('proj-sub').textContent = vm.project.sub;
  $('ts').textContent = 'last update · ' + vm.tsLabel;

  const chips = $('dna-chips');
  chips.replaceChildren();
  for (const { token, value } of vm.dnaChips) {
    const chip = document.createElement('div');
    chip.className = 'dna-chip';
    chip.style.background = value;
    chip.setAttribute('data-token', token + ': ' + value);
    chips.appendChild(chip);
  }

  lastVm = vm;
  currentShots = vm.screenshots;
  renderStats(vm.stats);
  renderWaves(vm.waves);
  paintSections();
  renderHotspots(vm.hotspots);
  renderShots(vm.screenshots);
  renderGraph(vm.graph);
  if (lbOpen) paintLightbox(); // keep an open lightbox in sync with fresh captures

  $('context').textContent = vm.context || '(empty)';
  $('decisions').textContent = vm.decisions || '(empty)';

  firstPaint = false;
}

// ── Phase 3: filtering ──
function paintSections() {
  if (!lastVm) return;
  const emptyMsg = lastVm.sections.length ? 'no sections match this filter' : 'no sections yet — run /gen:plan';
  renderSections(filterSections(lastVm.sections, filterState), emptyMsg);
}
for (const b of document.querySelectorAll('.facet')) {
  b.addEventListener('click', () => {
    filterState.verdict = b.dataset.verdict;
    for (const x of document.querySelectorAll('.facet')) {
      const on = x === b;
      x.classList.toggle('active', on);
      x.setAttribute('aria-pressed', String(on));
    }
    paintSections();
  });
}
$('filter-q').addEventListener('input', e => { filterState.q = e.target.value; paintSections(); });

// ── Phase 3: focus trap shared by drawer + lightbox ──
function focusables(c) {
  return [...c.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')]
    .filter(el => !el.disabled && el.offsetParent !== null);
}
function trapTab(e, c) {
  if (e.key !== 'Tab') return;
  const f = focusables(c);
  if (!f.length) return;
  const first = f[0], last = f[f.length - 1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
}

// ── Phase 3: section detail drawer ──
async function openSection(name) {
  const myReq = ++drawerReq; // guard: a newer open supersedes a slow in-flight one
  drawerReturn = document.activeElement;
  $('drawer-title').textContent = name;
  $('drawer-beat').textContent = '';
  $('drawer-body').replaceChildren(emptyEl('loading…'));
  openDrawer();
  try {
    const res = await fetch('/api/section/' + encodeURIComponent(name));
    const json = res.ok ? await res.json() : null;
    if (myReq !== drawerReq) return; // superseded — don't paint a stale section
    if (!json) throw new Error('HTTP ' + res.status);
    paintDrawer(buildSectionDetail(json));
  } catch (err) {
    if (myReq !== drawerReq) return;
    $('drawer-body').replaceChildren(divText('empty', 'could not load section — ' + (err.message || err)));
  }
}
function paintDrawer(d) {
  $('drawer-title').textContent = d.name || 'Section';
  $('drawer-beat').textContent = [d.beat, d.wave != null ? 'Wave ' + d.wave : ''].filter(Boolean).join(' · ');
  const body = $('drawer-body');
  body.replaceChildren();

  const vblock = document.createElement('div');
  vblock.appendChild(divText('drawer-label', 'Verification'));
  const badge = document.createElement('span');
  badge.className = 'badge ' + d.verdict.state;
  badge.textContent = d.verdict.label + (d.verdict.ceiling != null ? '  ·  ceiling ' + d.verdict.ceiling : '');
  vblock.appendChild(badge);
  for (const f of d.verdict.failures) {
    const row = document.createElement('div'); row.className = 'fail-row';
    const chk = document.createElement('span'); chk.className = 'chk'; chk.textContent = f.check;
    const det = document.createElement('span'); det.className = 'fail-detail'; det.textContent = f.detail || '(no detail)';
    row.append(chk, det); vblock.appendChild(row);
  }
  body.appendChild(vblock);
  body.appendChild(preBlock('Summary', d.summary || '(no SUMMARY.md)'));
  body.appendChild(preBlock('Plan', d.plan || '(no PLAN.md)'));
}
function preBlock(label, text) {
  const wrap = document.createElement('div');
  wrap.appendChild(divText('drawer-label', label));
  const pre = document.createElement('pre'); pre.textContent = text;
  wrap.appendChild(pre);
  return wrap;
}
function openDrawer() {
  $('scrim').hidden = false;
  $('drawer').hidden = false;
  requestAnimationFrame(() => $('drawer').classList.add('open'));
  drawerOpen = true;
  $('drawer-close').focus();
}
function closeDrawer() {
  $('drawer').classList.remove('open');
  $('drawer').hidden = true;
  $('scrim').hidden = true;
  drawerOpen = false;
  if (drawerReturn && drawerReturn.focus) drawerReturn.focus();
}
$('drawer-close').addEventListener('click', closeDrawer);
$('scrim').addEventListener('click', closeDrawer);
$('drawer').addEventListener('keydown', e => trapTab(e, $('drawer')));

// ── Phase 3: screenshot lightbox ──
function openLightbox(i) {
  if (!currentShots.length) return;
  lbReturn = document.activeElement;
  lbIndex = Math.max(0, Math.min(currentShots.length - 1, i));
  paintLightbox();
  $('lightbox').hidden = false;
  lbOpen = true;
  $('lb-close').focus();
}
function paintLightbox() {
  lbIndex = Math.max(0, Math.min(currentShots.length - 1, lbIndex)); // re-clamp if the capture set shrank
  const sh = currentShots[lbIndex];
  if (!sh) return;
  $('lb-img').src = '/api/screenshot/' + encodeURIComponent(sh.file);
  $('lb-img').alt = (sh.label || '') + ' screenshot';
  $('lb-cap').textContent = (sh.label || '') + ' · ' + sh.width + 'px';
  $('lb-prev').disabled = lbIndex === 0;
  $('lb-next').disabled = lbIndex === currentShots.length - 1;
}
function lbStep(delta) {
  const next = Math.max(0, Math.min(currentShots.length - 1, lbIndex + delta));
  if (next !== lbIndex) { lbIndex = next; paintLightbox(); }
}
function closeLightbox() {
  $('lightbox').hidden = true;
  lbOpen = false;
  if (lbReturn && lbReturn.focus) lbReturn.focus();
}
$('lb-close').addEventListener('click', closeLightbox);
$('lb-prev').addEventListener('click', () => lbStep(-1));
$('lb-next').addEventListener('click', () => lbStep(1));
$('lightbox').addEventListener('click', e => { if (e.target === $('lightbox')) closeLightbox(); });
$('lightbox').addEventListener('keydown', e => trapTab(e, $('lightbox')));

document.addEventListener('keydown', e => {
  if (lbOpen) {
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') lbStep(-1);
    else if (e.key === 'ArrowRight') lbStep(1);
  } else if (drawerOpen && e.key === 'Escape') closeDrawer();
});

const evt = new EventSource('/api/sse');
evt.onmessage = e => {
  try { render(buildViewModel(JSON.parse(e.data), new Date().toISOString())); } catch (err) { console.error('render failed', err); }
};
evt.onerror = () => setTimeout(() => location.reload(), 3000);
</script>
</body>
</html>
