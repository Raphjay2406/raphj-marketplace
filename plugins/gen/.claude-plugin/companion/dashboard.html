<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genorah Dashboard</title>
<style>
  :root {
    --bg: #0a0a0b; --surface: #141418; --text: #e8e8ea; --muted: #8a8a95;
    --border: #2a2a31; --primary: #7c5cff; --ok: #3fc28a; --warn: #f0a830; --fail: #ef4458;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace; }
  .container { max-width: 1440px; margin: 0 auto; padding: 24px; display: grid; gap: 24px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--ok); border-radius: 50%; margin-right: 8px; }
  .dna-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .dna-chip { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); position: relative; }
  .dna-chip:hover::after { content: attr(data-token); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 4px 8px; border-radius: 4px; white-space: nowrap; font-size: 11px; }
  section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }
  .waves { display: flex; gap: 8px; flex-wrap: wrap; }
  .wave-pill { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; }
  .wave-pill.done { border-color: var(--ok); color: var(--ok); }
  .wave-pill.building { border-color: var(--primary); color: var(--primary); }
  .wave-pill.failed { border-color: var(--fail); color: var(--fail); }
  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .section-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .section-card .beat { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .section-card .name { font-weight: 600; font-size: 14px; margin: 4px 0; }
  .section-card .score { font-size: 24px; font-weight: 700; color: var(--primary); }
  .section-card .score.low { color: var(--warn); }
  .section-card .score.fail { color: var(--fail); }
  .section-card .tier { font-size: 11px; color: var(--muted); }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; white-space: pre-wrap; font-size: 12px; max-height: 300px; overflow: auto; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 600; }
  .action-btn:hover { opacity: 0.9; }
  .action-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .empty { color: var(--muted); font-style: italic; padding: 24px; text-align: center; }
  .queued-banner { background: var(--warn); color: var(--bg); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-weight: 600; }
  #graph-frame { width: 100%; height: 420px; border: none; border-radius: 8px; background: var(--bg); margin-top: 12px; }
  #graph-summary code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .verdict { display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; letter-spacing:.06em; }
  .badge.pass { background:color-mix(in srgb, var(--ok) 18%, transparent); color:var(--ok); }
  .badge.fail { background:color-mix(in srgb, var(--fail) 18%, transparent); color:var(--fail); }
  .badge.none { background:var(--bg); color:var(--muted); }
  .chk { font-size:10px; color:var(--fail); border:1px solid var(--fail); border-radius:4px; padding:1px 5px; }
  .ceil { font-size:11px; color:var(--muted); margin-left:auto; }
  .hot-row { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:12px; }
  .hot-bar { height:10px; background:var(--fail); border-radius:3px; min-width:2px; }
  .hot-name { width:110px; color:var(--text); }
  .hot-count { color:var(--muted); }
  .shots-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; }
  .shot { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--bg); }
  .shot img { width:100%; display:block; }
  .shot .lbl { font-size:10px; color:var(--muted); padding:6px 8px; text-transform:uppercase; letter-spacing:.08em; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1><span class="status-dot"></span><span id="proj-name">Genorah Dashboard</span></h1>
      <p style="font-size:12px;color:var(--muted);margin-top:4px;" id="proj-sub">—</p>
      <p style="font-size:12px; color: var(--muted); margin-top: 4px;" id="ts">—</p>
    </div>
    <div class="dna-chips" id="dna-chips"></div>
  </header>

  <div id="queued-banner" style="display:none;"></div>

  <section>
    <h2>Waves</h2>
    <div class="waves" id="waves"></div>
  </section>

  <section>
    <h2>Sections</h2>
    <div class="sections-grid" id="sections"></div>
  </section>

  <section>
    <h2>Gate Hotspots</h2>
    <div id="hotspots"></div>
  </section>

  <section>
    <h2>Visual QA — latest capture</h2>
    <div class="shots-grid" id="shots"></div>
  </section>

  <section>
    <h2>Quick Actions</h2>
    <div class="actions">
      <button class="action-btn" onclick="queueAction('audit')">Queue /gen:audit</button>
      <button class="action-btn secondary" onclick="queueAction('status')">Queue /gen:status</button>
      <button class="action-btn secondary" onclick="queueAction('self-audit')">Queue /gen:self-audit</button>
    </div>
    <p style="font-size: 11px; color: var(--muted); margin-top: 8px;">Buttons queue commands; run the matching /gen:* command in your Claude Code session.</p>
  </section>

  <section id="graph-panel">
    <h2>Knowledge Graph</h2>
    <div id="graph-summary"></div>
    <iframe id="graph-frame" src="/api/graph" title="Knowledge graph"></iframe>
  </section>

  <section>
    <h2>Context</h2>
    <pre id="context">loading…</pre>
  </section>

  <section>
    <h2>Decisions (tail)</h2>
    <pre id="decisions">loading…</pre>
  </section>
</div>

<script>
function render(state) {
  const meta = state.project_meta || {};
  document.getElementById('proj-name').textContent = meta.name || 'Genorah Dashboard';
  document.getElementById('proj-sub').textContent =
    [meta.archetype, meta.goal].filter(Boolean).join(' · ') || '—';
  document.getElementById('ts').textContent = 'last update: ' + state.ts;

  // DNA chips
  const chips = document.getElementById('dna-chips');
  chips.innerHTML = '';
  for (const [tok, val] of Object.entries(state.dna_tokens || {})) {
    const chip = document.createElement('div');
    chip.className = 'dna-chip';
    chip.style.background = val;
    chip.setAttribute('data-token', tok + ': ' + val);
    chips.appendChild(chip);
  }

  // Waves (derived from MASTER-PLAN) — textContent-safe
  const waves = document.getElementById('waves');
  waves.replaceChildren();
  const waveMatches = [...(state.master_plan || '').matchAll(/wave[:\s]+(\d+)/gi)];
  const uniqWaves = [...new Set(waveMatches.map(m => m[1]))];
  if (!uniqWaves.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'no waves defined';
    waves.appendChild(empty);
  } else {
    for (const n of uniqWaves) {
      const pill = document.createElement('div');
      pill.className = 'wave-pill';
      pill.textContent = `Wave ${n}`;
      waves.appendChild(pill);
    }
  }

  // Sections — use textContent for all data fields (XSS-safe)
  const sec = document.getElementById('sections');
  sec.replaceChildren();
  if (!(state.sections || []).length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'no sections yet — run /gen:plan';
    sec.appendChild(empty);
  } else {
    for (const s of state.sections) {
      const score = s.score ?? '—';
      const scoreClass = s.score == null ? '' : s.score >= 200 ? '' : s.score >= 170 ? 'low' : 'fail';
      const card = document.createElement('div');
      card.className = 'section-card';
      const makeDiv = (cls, text) => { const d = document.createElement('div'); d.className = cls; d.textContent = text; return d; };
      card.appendChild(makeDiv('beat', s.beat || '—'));
      card.appendChild(makeDiv('name', s.name));
      card.appendChild(makeDiv(`score ${scoreClass}`.trim(), String(score)));
      card.appendChild(makeDiv('tier', s.tier || s.status || 'pending'));
      const v = s.verdict;
      const vr = document.createElement('div');
      vr.className = 'verdict';
      const badge = document.createElement('span');
      if (!v) { badge.className = 'badge none'; badge.textContent = 'not verified'; }
      else if (v.floorPass) { badge.className = 'badge pass'; badge.textContent = 'FLOOR PASS'; }
      else { badge.className = 'badge fail'; badge.textContent = 'FLOOR FAIL'; }
      vr.appendChild(badge);
      if (v && v.floorPass === false) {
        for (const f of (v.failures || [])) {
          const chip = document.createElement('span');
          chip.className = 'chk'; chip.textContent = f.check;
          vr.appendChild(chip);
        }
      }
      if (v && v.ceiling != null) {
        const ceil = document.createElement('span');
        ceil.className = 'ceil'; ceil.textContent = 'ceiling ' + v.ceiling;
        vr.appendChild(ceil);
      }
      card.appendChild(vr);
      sec.appendChild(card);
    }
  }

  // Gate Hotspots
  const hot = document.getElementById('hotspots');
  hot.replaceChildren();
  const hotspots = state.hotspots || [];
  if (!hotspots.length) {
    const e = document.createElement('div'); e.className = 'empty';
    e.textContent = 'no failures — floor clean'; hot.appendChild(e);
  } else {
    const max = Math.max(...hotspots.map(h => h.count));
    for (const h of hotspots) {
      const row = document.createElement('div'); row.className = 'hot-row';
      const name = document.createElement('span'); name.className = 'hot-name'; name.textContent = h.check;
      const bar = document.createElement('div'); bar.className = 'hot-bar';
      bar.style.width = Math.round((h.count / max) * 180) + 'px';
      const cnt = document.createElement('span'); cnt.className = 'hot-count'; cnt.textContent = h.count;
      row.append(name, bar, cnt); hot.appendChild(row);
    }
  }

  // Screenshot grid
  const shots = document.getElementById('shots');
  shots.replaceChildren();
  const screenshots = state.screenshots || [];
  if (!screenshots.length) {
    const e = document.createElement('div'); e.className = 'empty';
    e.textContent = 'no captures yet — run /gen:audit'; shots.appendChild(e);
  } else {
    for (const sh of screenshots) {
      const cell = document.createElement('div'); cell.className = 'shot';
      const img = document.createElement('img');
      img.loading = 'lazy'; img.alt = sh.label;
      img.src = '/api/screenshot/' + encodeURIComponent(sh.file);
      const lbl = document.createElement('div'); lbl.className = 'lbl';
      lbl.textContent = sh.label + ' · ' + sh.width + 'px';
      cell.append(img, lbl); shots.appendChild(cell);
    }
  }

  // Action queue
  const banner = document.getElementById('queued-banner');
  if (state.action_queue && state.action_queue.length) {
    banner.style.display = 'block';
    banner.className = 'queued-banner';
    banner.textContent = `⚡ ${state.action_queue.length} queued action(s): ${state.action_queue.join(', ')}`;
  } else {
    banner.style.display = 'none';
  }

  // Knowledge Graph panel
  const graphSummary = document.getElementById('graph-summary');
  const graphFrame = document.getElementById('graph-frame');
  if (state.graph && state.graph.exists) {
    const { nodes, edges, ageMs } = state.graph;
    graphSummary.textContent = `${nodes} nodes · ${edges} edges · updated ${Math.round(ageMs / 1000)}s ago`;
    graphFrame.style.display = '';
  } else {
    graphSummary.innerHTML = 'No graph yet — run <code>gen:graphify scan</code>';
    graphFrame.style.display = 'none';
  }

  document.getElementById('context').textContent = state.context || '(empty)';
  document.getElementById('decisions').textContent = state.decisions_tail || '(empty)';
}

async function queueAction(cmd) {
  await fetch('/api/action/' + cmd, { method: 'POST', body: JSON.stringify({ at: new Date().toISOString() }) });
  alert('Queued /gen:' + cmd + '. Run it in your Claude Code session.');
}

const evt = new EventSource('/api/sse');
evt.onmessage = e => {
  try { render(JSON.parse(e.data)); } catch {}
};
evt.onerror = () => setTimeout(() => location.reload(), 3000);
</script>
</body>
</html>
