<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>3dsvg export harness</title>
  <style>body,html{margin:0;padding:0;background:transparent}canvas{display:block}</style>
</head>
<body>
<div id="root"></div>
<script type="module">
/**
 * Harness — loaded by Playwright. Expects:
 *  - window.__GENORAH_PRESET__: preset config (set by page.evaluate before mount)
 *  - window.__GENORAH_MOUNT__(): invoked to render
 *  - window.__GENORAH_CANVAS__: set by registerCanvas callback
 *  - window.__GENORAH_READY__: set to true on onReady
 *  - window.__GENORAH_ADVANCE__(t): for video frame-stepping
 *
 * NOTE: In production, vendor the 3dsvg package directly so no network access
 * is needed. For now this harness assumes 3dsvg is resolvable from the Playwright
 * launch CWD. Update this when vendoring 3dsvg + three + r3f as part of the MCP.
 */

import React from 'https://esm.sh/react@18';
import ReactDOM from 'https://esm.sh/react-dom@18/client';
import { SVG3D } from 'https://esm.sh/3dsvg';

window.__GENORAH_READY__ = false;
window.__GENORAH_CANVAS__ = null;

window.__GENORAH_MOUNT__ = function() {
  const cfg = window.__GENORAH_PRESET__;
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    React.createElement(SVG3D, {
      text: cfg.text,
      svg: cfg.svg,
      material: cfg.material,
      animate: cfg.animation,
      depth: cfg.depth,
      color: cfg.color,
      rotationY: cfg.rotationY || 0,
      width: '100vw',
      height: '100vh',
      background: 'transparent',
      registerCanvas: (canvas) => { window.__GENORAH_CANVAS__ = canvas; },
      onReady: () => { window.__GENORAH_READY__ = true; },
    })
  );
};

window.__GENORAH_ADVANCE__ = function(t) {
  // For video frame capture: manually advance 3dsvg's internal clock to time t.
  // NOTE: 3dsvg v0.2.x may not expose a public setTime API. Until it does,
  // this harness relies on real-time rendering — video export at 60fps uses
  // wall-clock timing, which is approximate. Vendor 3dsvg + patch for
  // deterministic time control in v3.4.2.
  const evt = new CustomEvent('genorah:advance', { detail: { t } });
  window.dispatchEvent(evt);
};
</script>
</body>
</html>
